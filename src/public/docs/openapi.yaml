openapi: 3.0.3
info:
  title: TaskFlow API
  version: 1.0.0
  description: |
    Documentação oficial da API do TaskFlow.

    Todas as respostas seguem o padrão JSON com o campo `data` para sucesso,
    e `message` + `status` (e opcionalmente `errors`) para falhas.
servers:
  - url: http://localhost:8000/api
    description: Ambiente local
  - url: http://127.0.0.1:8000/api
    description: Ambiente local (127.0.0.1)

tags:
  - name: Projects
  - name: Tasks
  - name: Tags
  - name: Profiles

paths:
  /projects:
    get:
      tags: [Projects]
      summary: Lista projetos
      responses:
        "200":
          description: Lista de projetos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Projects]
      summary: Cria um projeto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
            examples:
              exemplo:
                value:
                  user_id: 1
                  name: Projeto API
                  description: Implementar endpoints
                  status: open
                  deadline: "2026-04-30"
      responses:
        "201":
          description: Projeto criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Busca projeto por ID
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Projeto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWithRelationsResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Projects]
      summary: Atualiza projeto
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateRequest"
      responses:
        "200":
          description: Projeto atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Projects]
      summary: Remove projeto
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Projeto removido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{id}/tasks:
    get:
      tags: [Tasks]
      summary: Lista tarefas de um projeto
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Lista de tarefas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Tasks]
      summary: Cria tarefa em um projeto
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
            examples:
              exemplo:
                value:
                  title: Implementar autenticação
                  description: Criar middleware auth
                  status: pending
                  priority: high
                  due_date: "2026-04-20"
      responses:
        "201":
          description: Tarefa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{id}/tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Busca tarefa por ID em um projeto
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Tarefa encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskWithRelationsResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Tasks]
      summary: Atualiza tarefa
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateRequest"
      responses:
        "200":
          description: Tarefa atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Tasks]
      summary: Remove tarefa
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Tarefa removida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /projects/{id}/tasks/{taskId}/status:
    patch:
      tags: [Tasks]
      summary: Atualiza somente status da tarefa
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, done]
      responses:
        "200":
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /tags:
    get:
      tags: [Tags]
      summary: Lista tags
      responses:
        "200":
          description: Lista de tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Tags]
      summary: Cria tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagCreateRequest"
            examples:
              exemplo:
                value:
                  name: Bug
                  color: "#FF0000"
      responses:
        "201":
          description: Tag criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /tasks/{taskId}/tags/{tagId}:
    post:
      tags: [Tags]
      summary: Associa uma tag à tarefa
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - $ref: "#/components/parameters/TagId"
      responses:
        "200":
          description: Tag associada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Tags]
      summary: Remove associação de tag da tarefa
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - $ref: "#/components/parameters/TagId"
      responses:
        "200":
          description: Tag removida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{id}/profile:
    get:
      tags: [Profiles]
      summary: Busca perfil do usuário
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Perfil encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Profiles]
      summary: Cria ou atualiza perfil do usuário
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpsertRequest"
      responses:
        "200":
          description: Perfil processado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponseWithMessage"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    ValidationError:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    UserSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, in_progress, completed]
        deadline:
          type: string
          format: date
          nullable: true
        tasks_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          nullable: true
          pattern: "^#[a-fA-F0-9]{6}$"
        tasks_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        bio:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectCreateRequest:
      type: object
      required: [user_id, name]
      properties:
        user_id:
          type: integer
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, in_progress, completed]
        deadline:
          type: string
          format: date
          nullable: true

    ProjectUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, in_progress, completed]
        deadline:
          type: string
          format: date
          nullable: true

    TaskCreateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
          nullable: true

    TaskUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
          nullable: true

    TagCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        color:
          type: string
          nullable: true
          pattern: "^#[a-fA-F0-9]{6}$"

    ProfileUpsertRequest:
      type: object
      properties:
        bio:
          type: string
          nullable: true
        phone:
          type: string
          maxLength: 20
          nullable: true
        avatar_url:
          type: string
          format: uri
          maxLength: 255
          nullable: true

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
      required: [message, status]

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [message, errors]

    ProjectsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    ProjectResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Project"
        message:
          type: string

    ProjectWithRelationsResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/Project"
            - type: object
              properties:
                user:
                  $ref: "#/components/schemas/UserSummary"
                tasks:
                  type: array
                  items:
                    $ref: "#/components/schemas/Task"

    TasksListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    TaskResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Task"
        message:
          type: string

    TaskWithRelationsResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/Task"
            - type: object
              properties:
                project:
                  $ref: "#/components/schemas/Project"

    TagsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tag"

    TagResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Tag"
        message:
          type: string

    ProfileResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Profile"

    ProfileResponseWithMessage:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Profile"
        message:
          type: string
